<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BCI Dashboard — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #ccc; font-family: monospace; overflow: hidden; display: flex; height: 100vh; }

  /* ── 3D viewport ── */
  #viewport { flex: 1; position: relative; }

  /* ── Side panel ── */
  #panel {
    width: 280px; background: #111; border-left: 1px solid #222;
    display: flex; flex-direction: column; overflow-y: auto;
  }
  #panel h3 { font-size: 11px; color: #666; text-transform: uppercase; padding: 10px 12px 4px; letter-spacing: 1px; }

  /* Status */
  #status-bar {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border-bottom: 1px solid #222;
  }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #f44; flex-shrink: 0; }
  #status-text { font-size: 13px; }
  #latency { margin-left: auto; font-size: 11px; color: #888; }

  /* Stats grid */
  #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 8px 12px; border-bottom: 1px solid #222; }
  #stats div { background: #181818; padding: 6px 8px; border-radius: 3px; }
  #stats .val { font-size: 18px; color: #4f8; }
  #stats .lbl { font-size: 9px; color: #666; text-transform: uppercase; }

  /* Waveform canvas */
  #waveform-container { flex: 1; display: flex; flex-direction: column; padding: 8px 12px; min-height: 0; }
  #waveform-container h3 { padding: 0 0 4px; }
  .wav-row { display: flex; align-items: center; gap: 4px; height: 24px; margin: 1px 0; }
  .wav-label { width: 28px; font-size: 9px; color: #888; text-align: right; flex-shrink: 0; }
  .wav-canvas { flex: 1; height: 100%; background: #0d0d0d; border-radius: 2px; }

  /* Channel values */
  #ch-values { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 8px 12px; border-top: 1px solid #222; }
  .ch-item { display: flex; justify-content: space-between; padding: 2px 6px; font-size: 11px; background: #0d0d0d; border-radius: 2px; }
  .ch-item .ch-val { color: #4f8; }

  /* Bars at bottom of viewport */
  #bars {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; align-items: flex-end; height: 80px;
  }
  .bar { width: 24px; border-radius: 2px 2px 0 0; transition: height 0.06s; min-height: 1px; }
  .bar-label { position: absolute; bottom: -16px; font-size: 9px; color: #555; text-align: center; width: 24px; }
</style>
</head>
<body>
<div id="viewport">
  <div id="status-bar" style="position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);border-radius:6px;border:none;padding:6px 12px">
    <span id="status-dot"></span>
    <span id="status-text">Connecting...</span>
    <span id="latency"></span>
  </div>
  <div id="bars"></div>
</div>

<div id="panel">
  <div id="stats">
    <div><div class="val" id="stat-fps">0</div><div class="lbl">FPS</div></div>
    <div><div class="val" id="stat-frame">0</div><div class="lbl">Frame</div></div>
    <div><div class="val" id="stat-hb">0</div><div class="lbl">Heartbeat</div></div>
    <div><div class="val" id="stat-ch">0</div><div class="lbl">Channels</div></div>
  </div>

  <h3>Waveform</h3>
  <div id="waveform-container"></div>

  <h3>Channel Values</h3>
  <div id="ch-values"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
const cam = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
cam.position.set(-2.5, 1.8, 2.5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('viewport').prepend(renderer.domElement);

const controls = new OrbitControls(cam, renderer.domElement);
controls.target.set(0, 0.2, 0);
controls.enableDamping = true;

function resize() {
  const vp = document.getElementById('viewport');
  const w = vp.clientWidth, h = vp.clientHeight;
  cam.aspect = w / h; cam.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

// ── Hemisphere ──
const SEG = 32, RINGS = 12, RAD = 1;
const verts = [], idxs = [];
verts.push(0, RAD*0.3, 0);
for (let r = 1; r <= RINGS; r++) {
  const lat = (r / RINGS) * Math.PI * 0.5;
  const y = Math.cos(lat) * RAD, rr = Math.sin(lat) * RAD;
  for (let s = 0; s < SEG; s++) {
    const lon = (s / SEG) * Math.PI * 2;
    verts.push(Math.cos(lon)*rr, y, Math.sin(lon)*rr);
    const v = verts.length/3 - 1;
    if (r === 1) idxs.push(0, v, (s+1)%SEG + 1);
    else {
      const pr = (r-2)*SEG + 1, cr = (r-1)*SEG + 1, nx = (s+1)%SEG;
      idxs.push(pr+s, cr+s, pr+nx, cr+s, cr+nx, pr+nx);
    }
  }
}
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
geo.setIndex(idxs);
geo.computeVertexNormals();
const colors = new Float32Array(verts.length);
geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.6, metalness: 0.1 });
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// ── Electrodes ──
const N_CH = 8;
const electrodes = [];
const barContainer = document.getElementById('bars');
for (let i = 0; i < N_CH; i++) {
  const angle = (i / N_CH) * Math.PI * 2, lat = Math.PI * 0.35;
  const x = Math.cos(angle)*Math.sin(lat)*RAD, y = Math.cos(lat)*RAD, z = Math.sin(angle)*Math.sin(lat)*RAD;
  const sp = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), new THREE.MeshBasicMaterial({ color: 0x888888 }));
  sp.position.set(x, y, z); scene.add(sp); electrodes.push(sp);

  const wrap = document.createElement('div'); wrap.style.position = 'relative'; wrap.style.display = 'flex'; wrap.style.alignItems = 'center'; wrap.style.flexDirection = 'column';
  const bar = document.createElement('div'); bar.className = 'bar'; bar.style.background = 'linear-gradient(to top, #0a4, #0f8)';
  bar.style.height = '1px';
  const lbl = document.createElement('div'); lbl.className = 'bar-label'; lbl.textContent = `Ch${i}`;
  wrap.appendChild(bar); wrap.appendChild(lbl); barContainer.appendChild(wrap);
  electrodes[i]._bar = bar;

  // Label on sphere
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: makeLabel(`Ch${i}`), depthTest: false, transparent: true }));
  spr.position.set(x, y - 0.1, z); spr.scale.set(0.15, 0.05, 1); scene.add(spr);
}

function makeLabel(t) {
  const c = document.createElement('canvas'); c.width = 64; c.height = 20;
  const ctx = c.getContext('2d'); ctx.fillStyle = 'transparent'; ctx.fillRect(0,0,64,20);
  ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillText(t, 32, 14);
  return new THREE.CanvasTexture(c);
}

// ── Lights ──
scene.add(new THREE.AmbientLight(0x333333));
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(3, 5, 4); scene.add(dl);

// ── Waveform canvases ──
const WAV_LEN = 128;
const waveform = Array.from({length: N_CH}, () => new Float32Array(WAV_LEN));
const wavHeads = new Int32Array(N_CH);
const wavCols = ['#4488ff','#44ff88','#ff8844','#ff44ff','#44ffff','#ffff44','#ff4444','#88ff44'];
const wavContainer = document.getElementById('waveform-container');
const wavCanvases = [];
for (let i = 0; i < N_CH; i++) {
  const row = document.createElement('div'); row.className = 'wav-row';
  const lbl = document.createElement('div'); lbl.className = 'wav-label'; lbl.textContent = i;
  const cv = document.createElement('canvas'); cv.className = 'wav-canvas'; cv.width = 256; cv.height = 20;
  row.appendChild(lbl); row.appendChild(cv); wavContainer.appendChild(row);
  wavCanvases.push(cv);
}

function drawWaveforms() {
  for (let i = 0; i < N_CH; i++) {
    const cv = wavCanvases[i]; if (!cv) continue;
    const w = cv.width, h = cv.height, ctx = cv.getContext('2d');
    ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0, 0, w, h);
    const arr = waveform[i], head = wavHeads[i];
    ctx.strokeStyle = wavCols[i]; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let p = 0; p < WAV_LEN; p++) {
      const val = arr[(head + p) % WAV_LEN];
      const x = (p / WAV_LEN) * w, y = h - val * h;
      p === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ── Channel values panel ──
const chValContainer = document.getElementById('ch-values');
const chValEls = [];
for (let i = 0; i < N_CH; i++) {
  const el = document.createElement('div'); el.className = 'ch-item';
  el.innerHTML = `<span>Ch${i}</span><span class="ch-val">0.000</span>`;
  chValContainer.appendChild(el); chValEls.push(el.querySelector('.ch-val'));
}

// ── WebSocket ──
let intensities = new Array(N_CH).fill(0);
let frameCount = 0, hb = 0;
let wsLatency = -1;

function connectWS() {
  const ws = new WebSocket(`ws://${location.hostname}:8765`);
  ws.onopen = () => {
    document.getElementById('status-dot').style.background = '#4f8';
    document.getElementById('status-text').textContent = 'Connected';
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    frameCount = d.packet_id;
    hb = d.heartbeat;
    const ts = d.channels?.[0]?.duration_ms || 0;
    if (ts > 0) wsLatency = (performance.now() - ts * 1000);
    for (let i = 0; i < d.channel_count && i < N_CH; i++) {
      intensities[i] = d.channels[i].intensity;
      waveform[i][wavHeads[i]] = intensities[i];
    }
    for (let i = 0; i < N_CH; i++) wavHeads[i] = (wavHeads[i] + 1) % WAV_LEN;
  };
  ws.onclose = () => {
    document.getElementById('status-dot').style.background = '#f44';
    document.getElementById('status-text').textContent = 'Disconnected';
    document.getElementById('latency').textContent = '';
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
}
connectWS();

// ── Render ──
const BASE = new THREE.Color(0x222222), HOT = new THREE.Color(0xff6600);
let fpsFrames = 0, lastFps = performance.now();

function animate() {
  requestAnimationFrame(animate);

  fpsFrames++;
  const now = performance.now();
  if (now - lastFps > 500) {
    const fps = Math.round(fpsFrames * 1000 / (now - lastFps));
    document.getElementById('stat-fps').textContent = fps;
    document.getElementById('stat-frame').textContent = frameCount;
    document.getElementById('stat-hb').textContent = hb;
    document.getElementById('stat-ch').textContent = N_CH;
    document.getElementById('latency').textContent = wsLatency > 0 ? `${(wsLatency).toFixed(1)}ms` : '';
    fpsFrames = 0; lastFps = now;
  }

  // Topography
  const pos = geo.attributes.position.array;
  const col = geo.attributes.color.array;
  const INF_RAD = 0.35;
  for (let v = 0; v < pos.length / 3; v++) {
    let acc = 0, tw = 0;
    for (let j = 0; j < N_CH; j++) {
      const dx = pos[v*3] - electrodes[j].position.x;
      const dy = pos[v*3+1] - electrodes[j].position.y;
      const dz = pos[v*3+2] - electrodes[j].position.z;
      const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
      const w = Math.exp(-(dist*dist)/(INF_RAD*INF_RAD));
      acc += intensities[j] * w; tw += w;
    }
    const n = tw > 0 ? Math.min(Math.max(acc/tw, 0), 1) : 0;
    const c = BASE.clone().lerp(HOT, n);
    col[v*3] = c.r; col[v*3+1] = c.g; col[v*3+2] = c.b;
  }
  geo.attributes.color.needsUpdate = true;

  // Bars
  for (let i = 0; i < N_CH; i++) {
    const h = Math.max(1, intensities[i] * 120);
    electrodes[i]._bar.style.height = h + 'px';
    electrodes[i].material.color.setHSL(0.08 - intensities[i]*0.08, 0.8, 0.3 + intensities[i]*0.5);
    chValEls[i].textContent = intensities[i].toFixed(3);
  }

  drawWaveforms();
  controls.update();
  renderer.render(scene, cam);
}
animate();
</script>
</body>
</html>
