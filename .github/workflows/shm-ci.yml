name: SHM Integration CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: SHM Unit Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Build native bridge (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd native && make build/libbci_bridge.so

    - name: Run fast SHM unit tests
      run: pytest -v -m "not slow" tests/test_shm_gustation.py tests/test_shm_signal.py tests/test_shm_benchmark.py

  windows-native:
    name: Windows kernel32 SHM Tests
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run Windows-native SHM tests (kernel32 fallback)
      run: pytest -v -m "not slow" tests/test_shm_gustation.py tests/test_shm_signal.py tests/test_shm_benchmark.py
      env:
        SHM_NO_NATIVE_BRIDGE: "1"

    - name: Run C# mock cross-process test
      if: runner.os == 'Windows'
      run: pytest -v -m "slow" tests/test_csharp_mock.py

  e2e-linux:
    name: Linux E2E (Unity Consumer)
    runs-on: ubuntu-latest
    needs: [unit]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Build native bridge
      run: |
        cd native && make build/libbci_bridge.so

    - name: Build Unity consumer (requires Unity + Linux module)
      run: |
        chmod +x tools/rebuild_unity.sh
        ./tools/rebuild_unity.sh
      continue-on-error: true

    - name: Run E2E integration tests
      run: pytest -v -m "slow" tests/test_e2e_integration.py
      continue-on-error: true
